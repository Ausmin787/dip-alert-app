<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>dip-alert-app — README Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px; height: 380px;
      overflow: hidden;
      background: #0d0905;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .banner {
      position: relative;
      width: 1280px; height: 380px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 80px;
      /* Painterly layered background */
      background:
        radial-gradient(ellipse 55% 80% at 28% 58%, rgba(155, 88, 18, 0.92) 0%, transparent 58%),
        radial-gradient(ellipse 36% 85% at 0%  50%, rgba(12, 52, 22, 0.95) 0%, transparent 54%),
        radial-gradient(ellipse 40% 80% at 100% 50%, rgba(10, 48, 38, 0.90) 0%, transparent 54%),
        radial-gradient(ellipse 65% 44% at 50% 0%,  rgba(52, 12, 68, 0.88) 0%, transparent 60%),
        radial-gradient(ellipse 28% 36% at 46% 44%, rgba(210, 138, 28, 0.60) 0%, transparent 50%),
        radial-gradient(ellipse 42% 55% at 92% 90%, rgba(10, 32, 75, 0.80) 0%, transparent 55%),
        #0d0905;
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.030) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.030) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }
    /* Thin top accent line */
    .top-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(210,138,28,0.65) 30%, rgba(34,197,94,0.45) 65%, transparent);
    }

    /* Light frosted glass icon mark */
    .icon-mark {
      position: relative; z-index: 2;
      flex-shrink: 0;
      width: 84px; height: 84px;
      background: rgba(255, 255, 255, 0.12);
      border-top: 1.5px solid rgba(255,255,255,0.52);
      border-right: 1px solid rgba(255,255,255,0.22);
      border-bottom: 1px solid rgba(255,255,255,0.10);
      border-left: 1px solid rgba(255,255,255,0.22);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-right: 40px;
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.42);
      overflow: visible;
    }
    .icon-chart {
      display: block;
      width: 84px;
      height: 84px;
    }
    .icon-bell {
      position: absolute;
      top: 2px;
      right: 2px;
      transform: translate(42%, -42%);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
      background: rgba(18, 11, 4, 0.88);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 2px 8px rgba(0,0,0,0.40);
    }

    /* Text block */
    .text-block {
      position: relative; z-index: 2;
      flex: 1;
    }
    .eyebrow-row {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.60);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 54px; font-weight: 800;
      letter-spacing: -0.026em; line-height: 1.04;
      color: #fff;
      margin-bottom: 14px;
      text-shadow: 0 2px 30px rgba(0,0,0,0.55);
    }
    h1 em { font-style: normal; color: #fbbf24; }
    .sub {
      font-size: 16px; font-weight: 400;
      color: rgba(255,255,255,0.50);
      line-height: 1.5;
      max-width: 460px;
    }

    /* Right pill grid — light frosted glass */
    .pill-grid {
      position: relative; z-index: 2;
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 326px;
      margin-left: 56px;
    }
    .pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.12);
      border-top: 1px solid rgba(255,255,255,0.50);
      border-right: 1px solid rgba(255,255,255,0.20);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      border-left: 1px solid rgba(255,255,255,0.20);
      border-radius: 14px;
      padding: 11px 14px;
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      box-shadow: 0 4px 20px rgba(0,0,0,0.20), inset 0 1px 0 rgba(255,255,255,0.42);
    }
    .pill span {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.95);
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="banner">
  <div class="bg-grid"></div>
  <div class="top-line"></div>

  <!-- Icon mark with centered chart + corner bell -->
  <div class="icon-mark">
    <svg class="icon-chart" viewBox="0 0 84 84" fill="none" aria-hidden="true">
      <g transform="translate(1, 7)">
        <line x1="31" y1="23" x2="31" y2="30" stroke="#4ade80" stroke-width="1.35" stroke-linecap="round" opacity="0.88"/>
        <rect x="27.5" y="30" width="7" height="17" rx="1.2" fill="#4ade80" opacity="0.90"/>
        <line x1="31" y1="47" x2="31" y2="50" stroke="#4ade80" stroke-width="1.35" stroke-linecap="round" opacity="0.88"/>

        <line x1="42" y1="16" x2="42" y2="23" stroke="#4ade80" stroke-width="1.35" stroke-linecap="round"/>
        <rect x="38.5" y="23" width="7" height="22" rx="1.2" fill="#4ade80"/>
        <line x1="42" y1="45" x2="42" y2="48" stroke="#4ade80" stroke-width="1.35" stroke-linecap="round"/>

        <line x1="53" y1="26" x2="53" y2="30" stroke="#f87171" stroke-width="1.35" stroke-linecap="round"/>
        <rect x="49.5" y="30" width="7" height="20" rx="1.2" fill="#f87171"/>
        <line x1="53" y1="50" x2="53" y2="53" stroke="#f87171" stroke-width="1.35" stroke-linecap="round"/>

        <polyline points="25,47 33,39 41,41 49,30 57,37" fill="none" stroke="#fbbf24" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>
      </g>
    </svg>
    <div class="icon-bell" aria-hidden="true">
      <svg width="22" height="22" viewBox="25 5 14 16" fill="none">
        <path d="M35 13.5A4 4 0 0 0 27 13.5C27 17.5 25.5 18.5 25.5 18.5h11S35 17.5 35 13.5z" stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M29 18.5a1.5 1.5 0 0 0 2.9.2" stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="35.5" cy="9.5" r="2.5" fill="#f87171"/>
      </svg>
    </div>
  </div>

  <!-- Text block -->
  <div class="text-block">
    <div class="eyebrow-row">Ausmin787 / dip-alert-app</div>
    <h1>Never Miss a <em>Nifty 50</em> Dip</h1>
    <p class="sub">Automated WhatsApp alerts for every −1% fall from all-time high. FastAPI backend.</p>
  </div>

  <!-- Pill grid -->
  <div class="pill-grid">
    <div class="pill">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 2v9M3 7.5l3.5 4L10 7.5" stroke="#f87171" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Every −1% Dip</span>
    </div>
    <div class="pill">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <polyline points="1,10 4,6.5 7,8.5 10,4.5 12,6.5" stroke="#4ade80" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>Nifty 50</span>
    </div>
    <div class="pill">
      <svg width="18" height="18" viewBox="2 1 20 22" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;flex-shrink:0;">
        <path fill="#3DC557" fill-rule="evenodd" clip-rule="evenodd"
          d="M12 3C7.03 3 3 7.03 3 12c0 1.68.46 3.25 1.27 4.59L3 21l4.54-1.19A8.96 8.96 0 0 0 12 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 1.6a7.4 7.4 0 1 1 0 14.8 7.37 7.37 0 0 1-3.74-1.01l-.26-.16-2.72.71.73-2.64-.17-.27A7.36 7.36 0 0 1 4.6 12 7.4 7.4 0 0 1 12 4.6z"/>
        <path fill="#3DC557"
          d="M9.1 8.2c-.14-.32-.3-.33-.44-.34H8.3c-.14 0-.38.05-.58.27-.2.22-.76.74-.76 1.8s.78 2.1.89 2.24c.11.14 1.51 2.4 3.72 3.27 1.84.73 2.21.58 2.61.55.4-.04 1.28-.52 1.46-1.03.18-.5.18-.93.13-1.02-.05-.09-.2-.14-.42-.25-.21-.11-1.28-.63-1.48-.7-.2-.07-.34-.11-.48.1-.14.22-.55.7-.68.85-.12.14-.25.16-.47.05-.21-.1-.9-.33-1.72-1.06-.63-.57-1.06-1.27-1.19-1.49-.12-.21-.01-.33.09-.44.1-.1.21-.25.32-.37.1-.13.14-.22.21-.36.07-.14.04-.27-.02-.38-.05-.1-.47-1.17-.66-1.6z"/>
      </svg>
      <span>WhatsApp</span>
    </div>
    <div class="pill">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M3 2L1 6.5 3 11M10 2l2 4.5L10 11M8 1l-3 11" stroke="#93c5fd" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>FastAPI + React</span>
    </div>
  </div>
</div>
</body>
</html>
